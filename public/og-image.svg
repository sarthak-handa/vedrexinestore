<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030305"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#f59e0b" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>

  <!-- Gold accent bar -->
  <rect x="80" y="280" width="4" height="80" fill="url(#gold)" rx="2"/>

  <!-- Main title -->
  <text x="116" y="330" font-family="Georgia, serif" font-size="72" font-weight="300" fill="white" opacity="0.95">Ved Rexine Store</text>

  <!-- Tagline -->
  <text x="116" y="385" font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="#f59e0b" opacity="0.8">Premium Foam · EVA · Mattress Supplier · Delhi Since 1967</text>

  <!-- Products row -->
  <text x="116" y="450" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.4">PU Foam · EVA Sheets · EPE Foam · Spring Mattress · Rubber Adhesives · Insole Sheets · Toe Puff</text>

  <!-- Est badge -->
  <rect x="116" y="220" width="110" height="32" rx="16" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="171" y="241" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" letter-spacing="3">EST. 1967</text>

  <!-- Address -->
  <text x="1120" y="580" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.3" text-anchor="end">Karol Bagh, New Delhi 110005</text>

  <!-- V logo mark -->
  <rect x="1040" y="60" width="100" height="100" rx="16" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1090" y="133" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#f59e0b" text-anchor="middle">V</text>
</svg>
